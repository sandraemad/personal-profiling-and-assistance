<div class="container light-style flex-grow-1 container-p-y">
  <h4 class="font-weight-bold py-3 mb-4">إعدادات الحساب</h4>
  <div class="card overflow-hidden">
    <div class="row no-gutters row-bordered row-border-light">

      <div class="col-md-9">
        <div class="tab-content">
          <div class="tab-pane fade active show" id="account-general">
            <div class="card-body media align-items-center">
              <img
              [src]="image"
                alt="الصوره الشخصيه"
                class="d-block ui-w-80"
              />
              <div class="media-body ml-4">
                <label class="btn btn-outline-primary">
                  تحميل صورة جديدة
                  <input type="file" class="account-settings-fileinput" (change)="changIamge($event)"/>
                </label>
                
                <div class="text-light small mt-1">
                  يُسمح بصيغ JPEG الحد الأقصى للحجم 800 كيلوبايت
                </div>
              </div>
            </div>
            <hr class="border-light m-0" />
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" class="form-control mb-1" placeholder="اسم المستخدم" name="username" [(ngModel)]="username">
              </div>
              <div class="form-group">
                <label class="form-label">رقم الهاتف</label>
                <input type="text" class="form-control" placeholder="ادخل رقم الهاتف" name="phonenumber" [(ngModel)]="phonenumber">
              </div>
          
              <div class="form-group">
                <label class="form-label">الجنس</label>
                <input type="text" class="form-control" placeholder="الجنس" name="gender" [(ngModel)]="gender">
              </div>
            </div>
          </div>
    
        </div>
      </div>
    </div>
  </div>
  <div class="text-right mt-3">
    <button type="button" class="btn btn-primary" (click)="updateProfile()">حفظ التغييرات</button>&nbsp;
    <a [routerLink]="['/home']" routerLinkActive="router-link-active">
      <button type="button" class="btn btn-default">إلغاء</button>
    </a>
  </div>
</div>
